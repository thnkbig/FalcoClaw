run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - bodyclose
    - noctx
    - gosec

linters-settings:
  gosec:
    excludes:
      - G204  # Subprocess launched with variable — expected for actionners
    severity: medium

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
